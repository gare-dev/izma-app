services:
 redis:
  image: redis:7-alpine
  container_name: izma-redis
  restart: unless-stopped
  ports:
   - "6379:6379"
  volumes:
   - redis-data:/data
  healthcheck:
   test: ["CMD", "redis-cli", "ping"]
   interval: 10s
   timeout: 3s
   retries: 5

 web:
  build:
   context: .
   dockerfile: apps/web/Dockerfile
  container_name: izma-web
  restart: unless-stopped
  environment:
   - NODE_ENV=production
   - NEXT_PUBLIC_WS_URL=/ws/
  depends_on:
   - server

 server:
  build:
   context: .
   dockerfile: apps/server/Dockerfile
  container_name: izma-server
  restart: unless-stopped
  env_file:
   - apps/server/.env
  environment:
   - PORT=5051
   - REDIS_URL=redis://redis:6379
  depends_on:
   redis:
    condition: service_healthy

 nginx:
  build: ./nginx
  container_name: izma-nginx
  ports:
   - "8080:80"
  depends_on:
   - web
   - server

volumes:
 redis-data:
