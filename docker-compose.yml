services:
 web:
  build:
   context: .
   dockerfile: apps/web/Dockerfile
  container_name: izma-web
  restart: unless-stopped
  environment:
   - NODE_ENV=production
   - NEXT_PUBLIC_WS_URL=/ws/
  depends_on:
   - server

 server:
  build:
   context: .
   dockerfile: apps/server/Dockerfile
  container_name: izma-server
  restart: unless-stopped
  env_file:
   - apps/server/.env
  environment:
   - PORT=5051

 nginx:
  build: ./nginx
  container_name: izma-nginx
  ports:
   - "8080:80"
  depends_on:
   - web
   - server
