events {}

http {
  upstream web {
    server web:3000;
  }

  upstream server_api {
    server server:3001;
  }

  server {
    listen 80;

    # FRONTEND
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # API HTTP
    location /api/ {
      proxy_pass http://server_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # WEBSOCKET
    location /ws/ {
      proxy_pass http://server_api;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
    }
  }
}