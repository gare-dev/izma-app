services:
 web:
  build:
   context: .
   dockerfile: apps/web/Dockerfile
  container_name: izma-web-dev
  working_dir: /app/apps/web
  volumes:
   - .:/app
   - /app/node_modules
  command: bunx next dev -H 0.0.0.0
  environment:
   - NODE_ENV=development
   - NEXT_PUBLIC_WS_URL=ws://server:3001/ws/
   - CHOKIDAR_USEPOLLING=true
  ports:
   - "3000:3000"
  depends_on:
   - server

 server:
  build:
   context: .
   dockerfile: apps/server/Dockerfile
  container_name: izma-server-dev
  working_dir: /app
  volumes:
   - .:/app
  command: bun run --watch apps/server/src/index.ts
  environment:
   - PORT=3001
  ports:
   - "3001:3001"
