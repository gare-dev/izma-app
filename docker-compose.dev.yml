services:
 web:
  build:
   context: .
   dockerfile: apps/web/Dockerfile
   target: deps
  container_name: izma-web-dev
  volumes:
   - .:/app
   - /app/node_modules
   - /app/apps/web/.next
  command: bun run --cwd apps/web dev
  environment:
   - NODE_ENV=development
   - NEXT_PUBLIC_WS_URL=ws://localhost/ws/
  ports:
   - "3000:3000"
  depends_on:
   - server
  restart: unless-stopped

 server:
  build:
   context: .
   dockerfile: apps/server/Dockerfile
  container_name: izma-server-dev
  volumes:
   - .:/app
  command: bun run --watch apps/server/src/index.ts
  environment:
   - PORT=3001
  restart: unless-stopped

 nginx:
  build: ./nginx
  container_name: izma-nginx-dev
  ports:
   - "80:80"
  depends_on:
   - web
   - server
  restart: unless-stopped
